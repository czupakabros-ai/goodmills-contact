<!DOCTYPE html>
<html lang="pl">

<head>

    <!-- ==========================================================
         GoodMills Contact
         Version : 0.1
         Author  : Krzysztof Ciesielski
         Project : GoodMills Contact
    =========================================================== -->

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Krzysztof Ciesielski | GoodMills Contact</title>

    <meta name="description"
          content="Cyfrowa wizytówka Krzysztofa Ciesielskiego - Technologa GoodMills Innovation Polska">

    <meta name="theme-color"
          content="#6F7C42">

    <meta name="color-scheme"
          content="light">

    <meta name="robots"
          content="index, follow">

    <link rel="manifest"
          href="manifest.json">

    <link rel="icon"
          href="assets/favicon.png">

    <link rel="apple-touch-icon"
          href="assets/favicon.png">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div id="app">

    <!-- HERO -->

    <header class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <div class="logo-wrapper">

                <img
                        src="assets/logo.png"
                        alt="GoodMills Innovation"
                        class="logo">

            </div>

            <h1 id="person-name">
                Krzysztof Ciesielski
            </h1>

            <p id="person-title">
                Technolog – Doradca Klienta
            </p>

            <p id="company-name">
                GoodMills Innovation Polska
            </p>

        </div>

    </header>

    <!-- MAIN -->

    <main class="content">

        <!-- GŁÓWNA AKCJA -->

        <section class="primary-action">

            <button id="saveContact"
                    class="button-primary">

                Dodaj do kontaktów

            </button>

        </section>

        <!-- KARTY -->

        <section id="contact-actions" class="actions">

            <a class="card"
               id="phoneCard">

                <div class="card-icon">

                </div>

                <div class="card-text">

                    <h2>Zadzwoń</h2>

                    <p id="phoneNumber"></p>

                </div>

            </a>

            <a class="card"
               id="emailCard">

                <div class="card-icon">

                </div>

                <div class="card-text">

                    <h2>E-mail</h2>

                    <p id="emailAddress"></p>

                </div>

            </a>

            <a class="card"
               id="websiteCard">

                <div class="card-icon">

                </div>

                <div class="card-text">

                    <h2>GoodMills</h2>

                    <p>www.goodmills.com</p>

                </div>

            </a>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>

            Technologia • Innowacja • Partnerstwo

        </p>

    </footer>

</div>

<script src="js/app.js"></script>

</body>

</html>
